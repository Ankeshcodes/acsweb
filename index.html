<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #0b0e14; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }
        
        /* Power-Up Animation */
        .processor-node {
            width: 100px; height: 100px;
            background: radial-gradient(circle, #00d4ff, #0055ff);
            margin: 50px auto;
            border-radius: 50%;
            box-shadow: 0 0 20px #00d4ff;
            animation: powerPulse 2s infinite ease-in-out;
        }

        @keyframes powerPulse {
            0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 10px #00d4ff; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 40px #00d4ff; }
            100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 10px #00d4ff; }
        }

        h1 { margin-top: 20px; text-transform: uppercase; letter-spacing: 5px; }
        .nav a { color: #00d4ff; text-decoration: none; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="processor-node"></div>
    <h1>System Initializing...</h1>
    <p>Your shop is booting up. Coming Soon!</p>

    <div class="nav">
        <a href="index.html">Home</a> | 
        <a href="shop.html">Shop</a> | 
        <a href="contact.html">Contact</a>
    </div>

</body>
</html>

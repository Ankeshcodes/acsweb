<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #050b15; color: #00d4ff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        
        /* 1. Animation Container */
        .startup-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* 2. Processor Node (Power Source) */
        .processor { width: 100px; height: 100px; background: #00d4ff; border-radius: 10px; box-shadow: 0 0 20px #00d4ff; animation: powerFlow 2s ease-in-out; }
        
        /* 3. Fan Animation */
        .fan { width: 150px; height: 150px; border: 5px solid #00d4ff; border-radius: 50%; margin-top: 20px; animation: spin 2s linear infinite; display: none; }

        @keyframes powerFlow {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="startup-container" id="startup">
        <div class="processor"></div>
        <div class="fan" id="fan"></div>
        <h2 id="status">INITIALIZING SYSTEM...</h2>
    </div>

    <script>
        // Animation logic: Fan start hoga 2 second baad
        setTimeout(() => {
            document.getElementById('fan').style.display = "block";
            document.getElementById('status').innerText = "SYSTEM POWERED UP!";
        }, 2000);
    </script>

</body>
</html>
